<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#222;
    }

    .container{
      width:100%;
      height:100vh;

      background:#dcdcdc;
      border:5px solid white;

      display:grid;

      grid-template-areas:
      "header header"
      "main sidebar"
      "footer footer";

      grid-template-columns:2fr 1fr;
      grid-template-rows:70px 1fr 60px;

      gap:10px;
      padding:10px;
    }

    .header{
      grid-area:header;
      background:#bfbfbf;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:22px;
      font-weight:bold;
    }

    .main{
      grid-area:main;
      background:#cfcfcf;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:22px;
    }

    .sidebar{
      grid-area:sidebar;

      display:grid;
      grid-template-rows:repeat(3,1fr);

      gap:10px;
    }

    .box{
      background:#cfcfcf;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:20px;
    }

    .footer{
      grid-area:footer;
      background:#bfbfbf;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:22px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">Header</div>

    <div class="main">Main Content</div>

    <div class="sidebar">
      <div class="box">Box 1</div>
      <div class="box">Box 2</div>
      <div class="box">Box 3</div>
    </div>

    <div class="footer">Footer</div>

  </div>

</body>
</html>
