<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Box</title>
</head>
<body style="background-color:#f2f2f2;">

    

    <form action="action.php" 
          style="background-color:orange; 
                 padding:20px; 
                 border-radius:10px; 
                 color:white; 
                 width:50%; 
                 margin:auto; 
                 box-shadow:0px 4px 10px rgba(0,0,0,0.3);" target="_blank" >
                 <h1 style="text-align:center; color:#333;">Registration Form</h1>

        <table border="1" 
               style="border-collapse:collapse; 
                      width:100%; 
                      background-color:orange; 
                      color:white;">
            
            <tr>
                <td style="padding:10px;"><label for="fname">First Name</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="text" name="fname" placeholder="Enter your firstname" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="lname">Last Name</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="text" name="lname" placeholder="Enter your lastname" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="phone">Phone</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="tel" name="phone" placeholder="Enter your phone number" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="email">Email</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="email" name="email" placeholder="Enter your email" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="password">Password</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="password" name="password" placeholder="Enter your password" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="date">Date of Birth</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="date" name="date" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="age">Age</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="number" name="age" placeholder="Enter your age" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="gender">Gender</label></td>
                <td style="padding:10px;border-radius:2px;">
                    <input type="radio" name="gender" value="male" required> Male
                    <input type="radio" name="gender" value="female" required> Female
                </td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="address">Address</label></td>
                <td style="padding:10px;border-radius:2px;"><textarea name="address" style="border-radius: 07px;" placeholder="Enter your address" required></textarea></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="country">Country</label></td>
                <td style="padding:10px;border-radius:2px;">
                    <select name="country" required>
                        <option value="">Select your country</option>
                        <option value="india">India</option>
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="australia">Australia</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="pincode">Pin Code</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="text" name="pincode" placeholder="Enter your pin code" required></td>
            </tr>
            <tr>
                <td style="padding:10px;"><label for="joining date">Joining Date</label></td>
                <td style="padding:10px;border-radius:2px;"><input style="border-radius: 07px;" type="date" name="joining date" required></td>   
            </tr>
            <tr>
                <td style="padding:10px;"><b>Confirm your form</b></td>
                <td style="padding:10px;">
                    <button type="submit" 
                            style="background-color:white; 
                                   color:orange; 
                                   padding:8px 15px; 
                                   border:none; 
                                   border-radius:5px; 
                                   cursor:pointer;">Submit</button>
                    <button type="reset" 
                            style="background-color:white; 
                                   color:orange; 
                                   padding:8px 15px; 
                                   border:none; 
                                   border-radius:5px; 
                                   cursor:pointer; 
                                   margin-left:10px;">Reset</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
