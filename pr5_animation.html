<!DOCTYPE html>
<html>
<head>
    <title>Animation with Transformation</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: lightgray;
        }

        .box{
            width: 120px;
            height: 120px;
            background-color: blue;
            animation: moveBox 4s infinite;
        }

        @keyframes moveBox {

            0%{
                transform: translateX(0px) rotate(0deg) /*scale(1);*/;
                background-color: blue;
            }

            25%{
                transform: translateX(200px) rotate(90deg) /*scale(1.2);*/;
                background-color: red;
            }

            50%{
                transform: translateY(200px) rotate(180deg) /*scale(1);
                background-color: green;
            }

            75%{
                transform: translateX(-200px) rotate(270deg); /*scale(1.2)*/;
                background-color: orange;
            }

            100%{
                transform: translateX(0px) rotate(360deg) ;/*scale(1);*/
                background-color: blue;
            }
        }
    </style>
</head>

<body>

    <div class="box"></div>

</body>
</html>
