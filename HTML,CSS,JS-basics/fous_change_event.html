<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Form</title>
</head>
<body>

    <h2>Shopping Form</h2>

    <!-- Product Selection -->
    <label for="select">Select Product:</label>

    <select id="select">
        <option value="">-- Select Product --</option>
        <option value="50000">Laptop</option>
        <option value="15000">Mobile</option>
        <option value="10000">TV</option>
    </select>

    <br><br>

    <!-- Quantity -->
    <label for="quantity">Enter Quantity:</label>

    <input type="number" id="quantity" min="1">

    <br><br>

    <!-- Price -->
    <label for="price">Price:</label>

    <input type="number" id="price" readonly>

    <br><br>

    <!-- Total -->
    <label for="total">Total Price:</label>

    <input type="number" id="total" readonly>

    <br><br>

    <script>

       function calculateTotal() {

            // Get selected product price
            const price = document.getElementById("select").value;

            // Get quantity
            const quantity = document.getElementById("quantity").value;

            // Calculate total
            const total = price * quantity;

            // Display price
            document.getElementById("price").value = price;

            // Display total
            document.getElementById("total").value = total;
            }

        // Run function when product changes
        document.getElementById("select")
            .addEventListener("change", calculateTotal);

        // Run function when quantity changes
        document.getElementById("quantity")
            .addEventListener("input", calculateTotal);

    </script>

</body>
</html>
