<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Document</title>
  <style type="text/css">
    table {
      border: 1px solid black;
      border-collapse: collapse;
      border-spacing: 2px;
      width: 50%;
      height: 230px;
      margin: auto; /* centers the table */
    }
    td {
      border: 1px solid black;
      text-align: center;
      padding: 5px;
    }
    .left { text-align: left; }
    .top { vertical-align: top; }
  </style>
</head>
<body>
  <table>
    <tr>
      <td colspan="2">A</td>
      <td colspan="5">B</td>
    </tr>
    <tr>
      <td>C</td><td>D</td><td>E</td>
      <td class="left">F</td>
      <td class="left">G</td>
      <td class="left">H</td>
      <td rowspan="3" class="top">J</td>
    </tr>
    <tr>
      <td rowspan="2">K</td>
      <td>M</td>
      <td colspan="2">N</td>
      <td colspan="2" class="left">I</td>
    </tr>
    <tr>
      <td>L</td><td>P</td><td>O</td><td>I</td><td>H</td>
    </tr>
  </table>
</body>
</html>
