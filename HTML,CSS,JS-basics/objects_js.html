<h3>user defined objects</h3>
        <script>
            let obj={
                fn:"farhan",
                ln:"shaikh",
                age:20,
                city:"ahemedabad",
                info:function()
                {
                    document.write("hello, " + obj.fn + " " + obj.ln + " your age is " + obj.age + "you living in " + obj.city);

                }
            }
            obj.info();
            </script>
            <h3>object  by key words</h3>
            <script>
                let obj2=new Object();

                    document.write(obj2.int);
                };

            </script>
