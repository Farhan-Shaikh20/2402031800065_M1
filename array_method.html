<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array method</title>
</head>
<body>
    <h1> Array creation methods</h1>
    <script>
        let name= new Array("ali","raj","farhan");//method 1
        document.write("name:(using new Array) " + name);
        document.write("<br><br>");
        let num=[40,50,20];//method 2
        document.write("number:(using array []) " + num);
        document.write("<br><br>");
        let name2= new Array(3);//method 3
        name2[0]="ali";
        name2[1]="raj";
        name2[2]="farhan";
        document.write("name2:(using new Array with size):new array(3) " + name2);
        document.write("<br><br><br>");
    </script>
    <h1> Array methods</h1>
    <ul>
        <li>push()</li>
        <li>pop()</li>
        <li>shift()</li>
        <li>unshift()</li>
        <li>slice()</li>
        <li>concat()</li>
    </ul>
    <script>
        let arr=[10,20,30,50];
        document.write("1. original array: " + arr);
        document.write("<br><br>");

        arr.push(60)
        document.write( "2. after push(60): " + arr);
        document.write(".     //add element at the end of the array)");
        document.write("<br><br>");

        arr.pop();
        document.write("3. after pop(): " + arr);
         document.write(".     //remove element from the end of the array)");
        document.write("<br><br>");

        arr.shift();
        document.write("4. after shift(): " + arr);
        document.write(".     //remove element from the beginning of the array)");
        document.write("<br><br>");

        arr.unshift(5);
        document.write("5. after unshift(5): " + arr);
        document.write(".     //add element at the beginning of the array)");
        document.write("<br><br>");

        let slicedArr=arr.slice(1,3);
        document.write("6. after slice(1,3): "+slicedArr);
        document.write(".     //returns a new array containing elements from index 1 to 2 (3 is not included))");
        document.write("<br><br>");

        let arr2=[70,80];
        let con_arr=arr.concat(arr2);
        document.write("7. after concat([70,80]):  "+con_arr);
        document.write(".     //returns a new array that is the result of concatenating arr and arr2)");
        document.write("<br><br>");

    </script>

    
</body>
</html>
